# Full CDC stack:
#   postgres (source of truth + pgvector) --WAL--> debezium connect --> kafka
#   kafka --> indexer-worker --> elasticsearch (keyword/BM25 index)
#   kafka --> embedding-worker --> pgvector (semantic index)
#   app: keyword branch reads elasticsearch, semantic branch reads pgvector.
#
# Observability (see docs/deployment/monitoring.md):
#   app + *-exporter services expose /metrics --scrape--> prometheus --query--> grafana
#   prometheus pulls: app (HTTP/pipeline), postgres, redis, elasticsearch, kafka.
# Dev credentials only - real deployments must read secrets from env/vault.

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_products
      KEYWORD_BACKEND: elasticsearch
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ../data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    # Logical decoding so Debezium can stream row changes from the WAL.
    command: >
      postgres -c wal_level=logical
               -c max_wal_senders=4
               -c max_replication_slots=4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_products
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_products"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # Kibana - web UI to browse/query Elasticsearch (Discover + Dev Tools).
  # Version pinned to the Elasticsearch image above. Open http://localhost:5601,
  # then create a Data View for the `product_chunks` index to browse it as a grid.
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kafka:
    image: apache/kafka:3.7.2
    environment:
      # Single-node KRaft (no ZooKeeper).
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Single-broker defaults for the internal topics.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Fixed cluster id so the data volume survives restarts.
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 20

  connect:
    image: debezium/connect:2.7.3.Final
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: rag-connect
      CONFIG_STORAGE_TOPIC: rag_connect_configs
      OFFSET_STORAGE_TOPIC: rag_connect_offsets
      STATUS_STORAGE_TOPIC: rag_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # One-shot: registers (or updates) the Debezium connector, then exits.
  # PUT /connectors/{name}/config is idempotent - safe on every `up`.
  connect-init:
    image: curlimages/curl:8.8.0
    volumes:
      - ./debezium:/config:ro
    # List form + literal block (|): newlines are preserved, so the shell
    # line-continuations below work. Do NOT use a folded scalar (>) here - it
    # turns each "\" + newline into "\ " (an escaped space) and breaks curl.
    entrypoint:
      - sh
      - -c
      - |
        until curl -sf http://connect:8083/connectors > /dev/null; do
          echo 'waiting for kafka connect...'
          sleep 3
        done
        curl -sf -X PUT http://connect:8083/connectors/product-catalog-connector/config \
          -H 'Content-Type: application/json' \
          -d @/config/product-catalog-connector.json \
          && echo 'debezium connector registered'
    depends_on:
      connect:
        condition: service_healthy
    restart: "no"

  # Kafka UI - web dashboard to browse topics, messages, consumer lag and the
  # Debezium connector. Pointed at the broker and Kafka Connect. Open
  # http://localhost:8080 (no login - dev stack). Read-only for the data itself:
  # the CDC topics are rebuilt from Postgres, so inspect here, don't hand-produce.
  kafka-ui:
    image: kafbat/kafka-ui:v1.4.2
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: rag
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      # Surface the Debezium connector under the same cluster view.
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
    depends_on:
      kafka:
        condition: service_healthy
      connect:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  indexer-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "python", "scripts/sync_worker.py", "--role", "indexer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
      # Worker writes this file every poll; the healthcheck below reads its age.
      WORKER_HEARTBEAT_FILE: /tmp/worker.heartbeat
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Healthy while the heartbeat is fresh (<30s). start_period covers the
      # first `uv sync` build + the startup wait-for-dependency backoff.
      test: ["CMD-SHELL", "test -f /tmp/worker.heartbeat && [ $(( $(date +%s) - $(stat -c %Y /tmp/worker.heartbeat) )) -lt 30 ]"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 180s

  embedding-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "python", "scripts/sync_worker.py", "--role", "embedder"]
    env_file:
      - ../.env  # embedding provider API key
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_products
      WORKER_HEARTBEAT_FILE: /tmp/worker.heartbeat
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker.heartbeat && [ $(( $(date +%s) - $(stat -c %Y /tmp/worker.heartbeat) )) -lt 30 ]"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 180s

  # ---------------------------------------------------------------------------
  # Observability stack: Prometheus scrapes /metrics from the app and the four
  # exporters below; Grafana visualises it. See docs/deployment/monitoring.md.
  # ---------------------------------------------------------------------------

  # Prometheus - pulls (scrapes) /metrics from every target on an interval and
  # stores the time series. Scrape targets are in docker/prometheus/prometheus.yml.
  # Open http://localhost:9090 (Status -> Targets to see what's UP).
  prometheus:
    image: prom/prometheus:v2.53.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Keep 15 days of history - plenty for a dev/observability stack.
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Grafana - dashboards on top of Prometheus. The datasource and a starter
  # "RAG - Overview" dashboard are auto-provisioned from docker/grafana/, so it
  # works out of the box. Open http://localhost:3000 (login admin / admin).
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Land straight on the provisioned overview dashboard.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/rag-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

  # postgres_exporter - turns Postgres internals (connections, transactions,
  # cache hit ratio, replication/WAL) into Prometheus metrics on :9187.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/rag_products?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  # redis_exporter - Redis stats (ops/sec, memory, hit rate, connected clients)
  # on :9121.
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_started

  # elasticsearch_exporter - cluster health, index docs/size, search & indexing
  # latency for the product_chunks keyword index on :9114.
  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
    command:
      - "--es.uri=http://elasticsearch:9200"
      - "--es.all"
      - "--es.indices"
      - "--es.indices_settings"
    ports:
      - "9114:9114"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # kafka_exporter - the key CDC signal: per-topic/consumer-group lag for the
  # sync workers, plus broker/partition offsets on :9308.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command:
      - "--kafka.server=kafka:9092"
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  pgdata:
  esdata:
  kafkadata:
  promdata:
  grafanadata:
