version: "3.8"

# Full CDC stack:
#   postgres (source of truth + pgvector) --WAL--> debezium connect --> kafka
#   kafka --> indexer-worker --> elasticsearch (keyword/BM25 index)
#   kafka --> embedding-worker --> pgvector (semantic index)
#   app: keyword branch reads elasticsearch, semantic branch reads pgvector.
# Dev credentials only - real deployments must read secrets from env/vault.

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_products
      KEYWORD_BACKEND: elasticsearch
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ../data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    # Logical decoding so Debezium can stream row changes from the WAL.
    command: >
      postgres -c wal_level=logical
               -c max_wal_senders=4
               -c max_replication_slots=4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_products
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_products"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.7.2
    environment:
      # Single-node KRaft (no ZooKeeper).
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Single-broker defaults for the internal topics.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Fixed cluster id so the data volume survives restarts.
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 20

  connect:
    image: debezium/connect:2.7.3.Final
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: rag-connect
      CONFIG_STORAGE_TOPIC: rag_connect_configs
      OFFSET_STORAGE_TOPIC: rag_connect_offsets
      STATUS_STORAGE_TOPIC: rag_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # One-shot: registers (or updates) the Debezium connector, then exits.
  # PUT /connectors/{name}/config is idempotent - safe on every `up`.
  connect-init:
    image: curlimages/curl:8.8.0
    volumes:
      - ./debezium:/config:ro
    entrypoint: >
      sh -c "
        until curl -sf http://connect:8083/connectors > /dev/null; do
          echo 'waiting for kafka connect...'; sleep 3;
        done;
        curl -sf -X PUT http://connect:8083/connectors/product-catalog-connector/config \
             -H 'Content-Type: application/json' \
             -d @/config/product-catalog-connector.json
        && echo 'debezium connector registered'
      "
    depends_on:
      connect:
        condition: service_healthy
    restart: "no"

  indexer-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "python", "scripts/sync_worker.py", "--role", "indexer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  embedding-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "python", "scripts/sync_worker.py", "--role", "embedder"]
    env_file:
      - ../.env  # embedding provider API key
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_products
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  esdata:
  kafkadata:
