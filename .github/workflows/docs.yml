name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Verify site output
        run: test -f site/index.html

      # Re-running the build job accumulates multiple "github-pages" artifacts in the
      # same workflow run; deploy-pages requires exactly one. Remove stale copies first.
      - name: Remove stale Pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts?per_page=100" \
            --paginate -q '.artifacts[] | select(.name=="github-pages") | .id' || true)
          if [ -n "$ids" ]; then
            echo "$ids" | while read -r id; do
              echo "Deleting artifact $id"
              gh api "repos/${{ github.repository }}/actions/artifacts/${id}" -X DELETE
            done
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
