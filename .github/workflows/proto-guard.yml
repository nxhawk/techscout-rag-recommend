name: proto-guard

# Ensure the proto submodule has no local edits and is always pinned to a
# commit that exists on techscout-protos@main (prevents bumping the pointer to
# a commit that was never pushed).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proto-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PROTO_BOT_TOKEN }}   # read the private techscout-protos submodule
      - name: Proto submodule must be clean and pinned to techscout-protos@main
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r name; do
            path=$(git config -f .gitmodules --get "submodule.$name.path")
            url=$(git config -f .gitmodules --get "submodule.$name.url")
            case "$url" in *techscout-protos*) : ;; *) continue ;; esac
            echo "== $path ($url)"
            # actions/checkout already injected credentials into the submodule
            # config -> fetch directly; do NOT add our own extraheader (that
            # produces a "Duplicate Authorization" header and a 400).
            git -C "$path" fetch -q origin main
            sha=$(git -C "$path" rev-parse HEAD)
            if ! git -C "$path" merge-base --is-ancestor "$sha" FETCH_HEAD; then
              echo "  x pinned commit $sha is NOT on techscout-protos@main (proto not pushed?)"
              fail=1
            fi
            if [ -n "$(git -C "$path" status --porcelain)" ]; then
              echo "  x submodule has local edits -- protos must be changed in techscout-protos"
              fail=1
            fi
            [ "$fail" = 0 ] && echo "  ok"
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | sed -E 's/^submodule\.(.*)\.path .*/\1/')
          exit $fail
