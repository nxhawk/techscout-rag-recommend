name: Build & Push to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Notify the meta repo (techscout-platform) that a new image is available
      # so it can (re)deploy the stack. Requires secret PLATFORM_DISPATCH_TOKEN:
      # a PAT (classic `repo` scope, or fine-grained with `contents: write`) on
      # techscout-platform.
      - name: Trigger platform deploy
        if: github.event_name == 'push'
        env:
          TOKEN: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$TOKEN" ]; then
            echo "::error::PLATFORM_DISPATCH_TOKEN secret is not set on this repo -- techscout-platform will never be notified. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          resp="$(mktemp)"
          status="$(curl -sS -o "$resp" -w '%{http_code}' -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository_owner }}/techscout-platform/dispatches \
            -d "{\"event_type\":\"service-updated\",\"client_payload\":{\"service\":\"rag-recommend\",\"sha\":\"${{ github.sha }}\"}}")"
          echo "HTTP $status"
          cat "$resp"
          if [ "$status" -ge 300 ]; then
            echo "::error::repository_dispatch to techscout-platform failed (HTTP $status, see response body above). If 403/404: PLATFORM_DISPATCH_TOKEN needs 'repo' scope (classic PAT) or 'Contents: Read and write' on techscout-platform (fine-grained PAT, and techscout-platform must be in that token's repository access list)."
            exit 1
          fi
          echo "Dispatched service-updated to techscout-platform."
