# Main Settings
project_name: "RAG Product Recommendation"
environment: "development"

# LLM
llm_provider: "gemini"
llm_model: "gemini-2.5-flash"
llm_max_tokens: 2048
llm_temperature: 0.3

# Embedding
embedding_provider: "gemini"
embedding_model: "gemini-embedding-001"

# Vector Database (Postgres + pgvector)
vector_db: "pgvector"
vector_db_url: "postgresql://postgres:postgres@localhost:5432/rag_products"  # overridden by DATABASE_URL env var
embedding_dim: 768  # text-embedding-004 -> 768 dims (was 1536 for OpenAI text-embedding-3-small)

# Retrieval
top_k_retrieve: 20
top_k_recommend: 5
top_k_compare: 3

# Hybrid retrieval (BM25 + Reciprocal Rank Fusion)
use_bm25: true
rrf_k: 60                 # RRF smoothing constant: score = sum(1 / (rrf_k + rank))
keyword_candidates: 50    # Max BM25 hits considered before fusion

# Cross-encoder reranking (requires: uv add sentence-transformers)
use_reranker: false
reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
