site_name: RAG Product Recommendation
site_description: Product recommendation & comparison system powered by RAG
site_url: https://nxhawk.github.io/rag-product-recommend/
repo_url: https://github.com/nxhawk/rag-product-recommend
repo_name: rag-product-recommend

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    # navigation.instant is intentionally omitted: it's incompatible with the
    # mkdocs-static-i18n language switcher's contextual links (would fail `mkdocs build --strict`).
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: vi
          name: Tiếng Việt
          build: true
          nav_translations:
            Home: Trang chủ
            Getting Started: Bắt đầu
            Installation: Cài đặt
            Quick Start: Bắt đầu nhanh
            Development Guide: Hướng dẫn phát triển
            Architecture: Kiến trúc
            Overview: Tổng quan
            C4 Model: Mô hình C4
            Data Flow: Luồng dữ liệu
            Write Path: Luồng ghi dữ liệu
            CDC Sync: Đồng bộ CDC
            Pipeline: Pipeline
            Pipeline Flow: Luồng xử lý
            Hybrid Retrieval: Truy xuất lai
            Project Structure: Cấu trúc dự án
            API Reference: Tài liệu API
            Endpoints: Endpoints
            Schemas: Schemas
            Deployment: Triển khai
            Docker: Docker
            CI/CD: CI/CD
            Development: Phát triển
            Contributing: Đóng góp
            Crawler: Crawler
            Ingestion: Nạp dữ liệu
            Testing: Kiểm thử
            Scripts: Scripts

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Development Guide: getting-started/development.md
  - Architecture:
      - Overview: architecture/overview.md
      - C4 Model: architecture/c4-model.md
      - Data Flow: architecture/data-flow.md
      - Write Path: architecture/write-path.md
      - CDC Sync: architecture/cdc.md
      - Pipeline: architecture/pipeline.md
      - Pipeline Flow: architecture/pipeline-flow.md
      - Hybrid Retrieval: architecture/hybrid-retrieval.md
      - Project Structure: architecture/structure.md
  - Scripts:
      - Overview: scripts/index.md
      - crawl.py: scripts/crawl.md
      - ingest.py: scripts/ingest.md
      - sync_worker.py: scripts/sync-worker.md
      - seed.py: scripts/seed.md
  - API Reference:
      - Endpoints: api/endpoints.md
      - Schemas: api/schemas.md
  - Deployment:
      - Docker: deployment/docker.md
      - Kibana: deployment/kibana.md
      - CI/CD: deployment/ci-cd.md
  - Development:
      - Contributing: development/contributing.md
      - Crawler: development/crawler.md
      - Ingestion: development/ingestion.md
      - Testing: development/testing.md
