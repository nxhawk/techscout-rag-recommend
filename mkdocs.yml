site_name: RAG Product Recommendation
site_description: Product recommendation & comparison system powered by RAG
site_url: https://nxhawk.github.io/rag-product-recommend/
repo_url: https://github.com/nxhawk/rag-product-recommend
repo_name: rag-product-recommend

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Development Guide: getting-started/development.md
  - Architecture:
      - Overview: architecture/overview.md
      - Pipeline: architecture/pipeline.md
      - Pipeline Flow: architecture/pipeline-flow.md
      - Project Structure: architecture/structure.md
  - API Reference:
      - Endpoints: api/endpoints.md
      - Schemas: api/schemas.md
  - Deployment:
      - Docker: deployment/docker.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
